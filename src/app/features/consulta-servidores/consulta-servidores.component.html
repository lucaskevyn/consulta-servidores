<div class="mx-auto px-8 py-4">
  <h2 class="text-2xl font-semibold text-slate-800 mb-4">
    Consulta Servidores — ADMRH
  </h2>

  <div class="mb-4">
    <input
      title="input1"
      type="file"
      accept=".xlsx"
      (change)="onFileSelected($event)"
      class="file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:bg-slate-700 file:text-white hover:file:bg-slate-800 cursor-pointer"
    />
  </div>

  <div *ngIf="loading" class="text-center my-8">
    <div
      class="w-10 h-10 border-4 border-gray-300 border-t-slate-700 rounded-full animate-spin mx-auto"
    ></div>
    <p class="mt-3 font-semibold text-slate-700">Carregando dados...</p>
  </div>

  <div
    *ngIf="!loading && dados.length > 0"
    class="border border-gray-300 rounded-lg overflow-hidden bg-white"
  >
    <p-table
      #dt
      [value]="dados"
      [paginator]="true"
      [columns]="cols"
      [rows]="rows"
      [scrollable]="true"
      scrollHeight="70vh"
      [globalFilterFields]="['matricula', 'nome', 'cargo', 'secretaria']"
      class="min-w-full text-xs"
      [exportHeader]="'header'"
      (sortFunction)="customSort($event)"
      [customSort]="true"
    >
      <ng-template #caption>
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i class="pi pi-search text-slate-600"></i>
            <input
              pInputText
              type="text"
              placeholder="Filtro global..."
              [(ngModel)]="globalFilterValue"
              (input)="dt.filterGlobal(globalFilterValue, 'contains')"
              class="h-9 px-3 rounded border border-gray-300"
            />
          </div>

          <div>
            <button
              title="add"
              pButton
              type="button"
              label="Limpar filtros"
              class="p-button-sm"
              (click)="clearTableFilters(dt)"
            ></button>
            <p-button
              icon="pi pi-external-link"
              label="Export"
              (click)="exportToCSV()"
            />
          </div>
        </div>
      </ng-template>

      <ng-template #header let-columns>
        <tr>
          <th
            *ngFor="let col of columns"
            [pSortableColumn]="col.field"
            class="text-sm p-2 whitespace-nowrap"
          >
            {{ col.header }} <p-sortIcon [field]="col.field" />
          </th>
        </tr>
        <tr>
          <th>
            <p-columnFilter
              type="text"
              field="matricula"
              matchMode="contains"
              showMenu="false"
              class="w-12"
            ></p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="apoio"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('apoio')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="grau"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('grau')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              type="text"
              field="nome"
              matchMode="contains"
              showMenu="false"
              class="w-12"
            ></p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="secretaria"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('secretaria')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="unidade"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('unidade')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="setor"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('setor')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="centro"
              matchMode="in"
              showMenu="false"
              class="w-12"
            ></p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="vinculo"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('vinculo')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="cargo"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('cargo')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="padrao"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('padrao')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="funcao"
              matchMode="in"
              [showMenu]="false"
              showClearButton="false"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('funcao')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
          <th>
            <p-columnFilter
              field="padrao_funcao"
              matchMode="in"
              showMenu="false"
              class="w-12"
            >
              <ng-template
                pTemplate="filter"
                let-filterCallback="filterCallback"
              >
                <p-multiSelect
                  [options]="getOptions('padrao_funcao')"
                  (onChange)="filterCallback($event.value)"
                  appendTo="body"
                />
              </ng-template>
            </p-columnFilter>
          </th>
        </tr>
      </ng-template>

      <ng-template #body let-row let-columns="columns">
        <tr class="hover:bg-slate-50">
          <td *ngFor="let col of columns">
            {{ row[col.field] }}
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="paginatorleft">
        <div class="text-sm text-gray-600">Mostrando {{ rows }} por página</div>
      </ng-template>
    </p-table>
  </div>

  <div *ngIf="!loading && (!dados || dados.length === 0)" class="text-gray-600">
    Faça o upload do arquivo .xlsx para exibir os dados.
  </div>
</div>
