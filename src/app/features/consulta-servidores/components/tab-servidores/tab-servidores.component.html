<div class="h-full overflow-hidden flex flex-col gap-2">
  <div class="flex justify-end shrink-0">
    <p-button
      icon="pi pi-external-link"
      label="Exportar"
      (click)="onExport()"
      styleClass="p-button-sm"
    ></p-button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-4 gap-3 h-full min-h-0">
    @for (area of areaVinculoStats; track area.areaName) {
      <div class="flex flex-col gap-3 h-full overflow-y-auto">
        <!-- Header -->
        <div class="sticky top-0 z-10">
          <app-card styleClass="bg-surface-0">
            <h3 class="font-bold text-rose-800 text-center text-sm uppercase">
              {{ area.areaName }}
            </h3>
          </app-card>
        </div>

        <!-- Total Servidores Card -->
        <app-card class="shrink-0" styleClass="bg-white">
          <span class="text-3xl font-bold text-rose-800 block">
            {{ area.totalServidores }}
          </span>
          <span class="text-xs text-surface-500"> Servidores </span>
        </app-card>

        <!-- Group Cards -->
        @for (group of area.groups; track group.category) {
          <app-card class="shrink-0" styleClass="bg-white p-3">
            <div
              class="flex justify-between items-center border-b border-surface-100 w-full"
            >
              <span class="font-bold text-surface-700 text-sm mb-1">{{
                group.category
              }}</span>
              <span class="font-bold text-rose-800 mb-1">{{
                group.total
              }}</span>
            </div>
            <div class="flex flex-col gap-2 w-full mt-2">
              @for (item of group.items; track item.label) {
                <div class="flex justify-between items-start text-xs group">
                  <span
                    class="text-surface-600 capitalize leading-tight pr-2"
                    >{{ item.label }}</span
                  >
                  <span class="font-semibold text-surface-900">{{
                    item.count
                  }}</span>
                </div>
              }
            </div>
          </app-card>
        }
      </div>
    }
  </div>
</div>
